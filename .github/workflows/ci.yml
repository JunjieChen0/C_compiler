name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc make
          update: false

      - name: Build compiler
        shell: msys2 {0}
        run: make cc

      - name: Run unit tests
        shell: msys2 {0}
        run: make test_lexer test_type test_sym test_gen test_preprocess test_pe

      - name: Run integration tests
        shell: msys2 {0}
        run: |
          set -e
          for prog in simple vars factorial loop preprocess_test self_host_test control_flow pointer_array bitwise string_ops; do
            echo "Compiling tests/programs/${prog}.c ..."
            ./cc.exe "tests/programs/${prog}.c" -o "tests/programs/${prog}.s"
            echo "  OK"
          done
          echo "All integration tests passed"